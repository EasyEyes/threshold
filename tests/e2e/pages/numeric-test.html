<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @font-face {
        font-family: "Plex";
        src: url("/examples/fonts/IBMPlexSans.ttf") format("truetype");
      }
      .t {
        font-family: "Plex";
        font-size: 40px;
        position: absolute;
        left: 0;
        margin: 0;
        padding: 0;
        border: 0;
        white-space: nowrap;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <span id="a" class="t" style="top: 0">1/2 2024 1st</span>
    <span
      id="b"
      class="t"
      style="top: 60px; font-feature-settings: &quot;frac&quot;"
      >1/2 2024 1st</span
    >
    <span
      id="c"
      class="t"
      style="top: 120px; font-variant-numeric: diagonal-fractions"
      >1/2 2024 1st</span
    >
    <span id="d" class="t" style="top: 180px; font-variant-numeric: ordinal"
      >1st 2nd 3rd</span
    >
    <span
      id="e"
      class="t"
      style="top: 240px; font-feature-settings: &quot;ordn&quot;"
      >1st 2nd 3rd</span
    >
    <script>
      window.runTest = async function () {
        await document.fonts.ready;
        function measure(id) {
          return Math.round(
            document.getElementById(id).getBoundingClientRect().width,
          );
        }
        return JSON.stringify({
          baseline: measure("a"),
          ffs_frac: measure("b"),
          fvn_diagfrac: measure("c"),
          fvn_ordinal: measure("d"),
          ffs_ordn: measure("e"),
        });
      };
    </script>
  </body>
</html>
